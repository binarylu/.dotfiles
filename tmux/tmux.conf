#--------------------------------------------------------------------------
# tmux Configuration {{{
#---------------------------------------------------------------------------
# Requires tmux >= 3.2 (XDG support + #{current_file} + source-file -F)
#
# Quick Reference:
#   bind-key (alias: bind)
#   bind -r: Allow multiple commands without pressing prefix again
#   set-option (alias: set)
#   set -g: Global option
#   setw (alias: set-window-option): Window option
#
# Prefix Key: Ctrl-a (instead of default Ctrl-b)
#   Managed by tmux-sensible: unbinds Ctrl-b, binds Ctrl-a send-prefix
#
# Key Bindings Quick Reference:
#   prefix + -            Split pane vertically
#   prefix + |            Split pane horizontally
#   prefix + h/j/k/l      Navigate panes
#   prefix + Ctrl-h/j/k/l Resize panes
#   prefix + Ctrl-u/d     Swap panes up/down
#   prefix + Ctrl-e       Last pane
#   prefix + a            Last window
#   prefix + Ctrl-m       Toggle mouse on/off
#   prefix + T            Set pane title (shows border; empty to hide)
#   prefix + [            Enter copy mode (default)
#   prefix + Ctrl-p       Open popup shell
#   prefix + !            Open htop
#   prefix + m            Open man page
#   prefix + R            Reload config
#   prefix + Ctrl-s       Save session (tmux-resurrect)
#   prefix + Ctrl-r       Restore session (tmux-resurrect)
#   In copy mode (tmux-yank):
#     y                   Copy selection to system clipboard
#     Y                   Copy current line to system clipboard
#   tmux-logging:
#     prefix + shift-p    Toggle logging
#     prefix + alt-p      Screen capture
#     prefix + alt-shift-p Save full history
#     prefix + alt-c      Clear history
#   prefix + I            Install plugins (TPM)
#   prefix + U            Update plugins (TPM)
#   prefix + alt-u        Uninstall unlisted plugins (TPM)
# }}}

#---------------------------------------------------------------------------
# General Settings {{{
#---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"

# message
# Set the amount of time for which status line messages and other on-screen
# indicators are displayed.  time is in milliseconds.
set -g display-time 2000
set -g message-style "fg=#eeeeee,bg=#222222,dim"

set -g allow-rename off
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity on

# Update the status bar every interval seconds.
set -g status-interval 10
set -g status-keys vi

setw -g mode-keys vi
setw -g automatic-rename off
# }}}

#---------------------------------------------------------------------------
# Bind Keys {{{
#---------------------------------------------------------------------------
# prefix key (Ctrl+a)
# tmux-sensible unbinds C-b and binds C-a send-prefix automatically
set -g prefix ^a

# split window
unbind '"'
bind - splitw -v -c "#{pane_current_path}" # vertical split (prefix -)
unbind %
bind | splitw -h -c "#{pane_current_path}" # horizontal split (prefix |)

# select pane
bind -r k selectp -U # above
bind -r j selectp -D # below
bind -r h selectp -L # left
bind -r l selectp -R # right

# resize pane
bind -r ^k resizep -U 5 # upward
bind -r ^j resizep -D 5 # downward
bind -r ^h resizep -L 5 # to the left
bind -r ^l resizep -R 5 # to the right

# swap pane
bind -r ^u swapp -U # swap with the previous pane
bind -r ^d swapp -D # swap with the next pane

# misc
bind -r ^e lastp  # select the last pane
bind -r a last    # select the last window

# mouse toggle with prefix C-m
bind ^m if-shell -F "#{mouse}" \
    "set -g mouse off; display 'Mouse: OFF'" \
    "set -g mouse on; display 'Mouse: ON'"

# copy mode - tmux-yank handles y for clipboard
# enter copy mode: prefix + [ (default)
bind -T copy-mode-vi v send-keys -X begin-selection # select (v)

# pane title: prompt for title, show border if set, hide if empty
bind T command-prompt -p "Pane title:" -I '#{pane_title}' \
    "select-pane -T '%%' ; if-shell 'tmux list-panes -t \"#{window_id}\" -F \"##{pane_title}\" | grep -q .' \
     'set -w pane-border-status top' \
     'set -w pane-border-status off'"

# app
bind ! splitw htop                                                   # htop (prefix !)
bind m command-prompt -p "Manual for:" "display-popup -E 'man %%'"  # man (prefix m)
bind ^p display-popup -d "#{pane_current_path}" -E                  # popup shell (prefix Ctrl+p)

# reload config (prefix R)
set-environment -ghF TMUX_CONF_PATH "#{current_file}"
bind R display "Reloading configuration..." \; source-file -F "#{TMUX_CONF_PATH}" \; display "Reloaded #{TMUX_CONF_PATH}"
# }}}

#---------------------------------------------------------------------------
# Status Bar {{{
#---------------------------------------------------------------------------
# statusbar
set -g status-style "fg=#eeeeee,bg=#222222,dim"
set -g status-left "#S#[default] >> "
set -g status-left-length 200
set -g status-right-style "fg=#7fb8d8"
set -g status-right "#[fg=brightwhite,bold]#{?client_prefix,#(tmux show -qgv prefix | sed 's/C-/\^/'),""}#[default] #(uptime | awk '{print \$(NF-2), \$(NF-1), \$NF}') #[fg=white]|#[fg=#00bb00] #{user} #[default]@ #[fg=#5555ff]#h#[default] | #[fg=#00bbbb]%a %b %d %R #{online_status} <<"
set -g status-right-length 100

# window
setw -g window-status-format "#I:#W(#{pane_current_command})#F"
setw -g window-status-style "fg=white"
setw -g window-status-current-format "[#I:#W(#{window_panes})#F]"
setw -g window-status-current-style "fg=#6c7e55,bg=#222222,bold"
# }}}

#---------------------------------------------------------------------------
# Plugins {{{
#---------------------------------------------------------------------------
# TPM - Tmux Plugin Manager
#   Installation: git clone https://github.com/tmux-plugins/tpm ${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm
#   Usage:
#     prefix + I        Install plugins
#     prefix + U        Update plugins
#     prefix + alt-u    Uninstall plugins not in list
set -g @plugin 'tmux-plugins/tpm'

# tmux-sensible - Sensible defaults everyone can agree on
#   Sets: escape-time 0, history-limit 50000, display-time 4000,
#         focus-events on, default-terminal screen-256color (if not changed)
#         Unbinds C-b and binds prefix send-prefix when prefix != C-b
#   https://github.com/tmux-plugins/tmux-sensible
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux-yank - Copy to system clipboard (macOS/Linux/SSH via OSC 52)
#   Usage in copy mode:
#     y    Copy selection to system clipboard
#     Y    Copy current line to system clipboard
#   https://github.com/tmux-plugins/tmux-yank
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection 'clipboard'        # Use system clipboard
set -g @yank_selection_mouse 'clipboard'  # Mouse selection also uses clipboard

# tmux-resurrect - Save and restore tmux sessions manually
#   Usage:
#     prefix + Ctrl-s    Save session
#     prefix + Ctrl-r    Restore session
#   Saves to: ${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect (XDG default)
#   https://github.com/tmux-plugins/tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on' # Save pane contents
set -g @resurrect-strategy-vim 'session'     # Restore vim sessions
set -g @resurrect-strategy-nvim 'session'    # Restore nvim sessions

# tmux-continuum - Automatic session save and restore (requires tmux-resurrect)
#   Auto-saves every 15 minutes, restores on tmux start
#   Usage:
#     prefix + Ctrl-s    Save session (from tmux-resurrect)
#     prefix + Ctrl-r    Restore session (from tmux-resurrect)
#   https://github.com/tmux-plugins/tmux-continuum
#set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @continuum-restore 'on'        # Auto-restore sessions on tmux start
#set -g @continuum-save-interval '15'  # Auto-save every 15 minutes

# tmux-online-status - Display online/offline status in status bar
#   Usage: add #{online_status} to status-right
#   https://github.com/tmux-plugins/tmux-online-status
set -g @plugin 'tmux-plugins/tmux-online-status'

# tmux-logging - Easy logging and screen capturing
#   Usage:
#     prefix + shift-p     Toggle logging    → ~/tmux-<session>-<window>-<pane>-<timestamp>.log
#     prefix + alt-p       Screen capture    → ~/tmux-screen-capture-<session>-<window>-<pane>-<timestamp>.log
#     prefix + alt-shift-p Save full history → ~/tmux-history-<session>-<window>-<pane>-<timestamp>.log
#     prefix + alt-c       Clear history
#   https://github.com/tmux-plugins/tmux-logging
set -g @plugin 'tmux-plugins/tmux-logging'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '${XDG_CONFIG_HOME:-$HOME/.config}/tmux/plugins/tpm/tpm'
# }}}

